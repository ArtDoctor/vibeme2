<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vibeme2 — Knight Realm</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <div id="join-panel" class="join-panel" aria-live="polite">
        <h1 class="join-title">vibeme2</h1>
        <p class="join-sub">Choose a nickname to join the realm.</p>
        <label class="join-label" for="join-nickname">Nickname</label>
        <input
          id="join-nickname"
          class="join-input"
          type="text"
          maxlength="24"
          autocomplete="username"
          placeholder="e.g. desert_knight"
        />
        <button id="join-submit" type="button" class="join-submit">Enter world</button>
        <p id="join-error" class="join-error hidden" role="alert"></p>
      </div>
      <canvas id="game-canvas"></canvas>
      <div id="hud-safe" class="hud-safe hidden" aria-live="polite">
        Safe zone — no PvP, no mobs
      </div>
      <div id="hud" class="hud" aria-live="polite">
        <p>Click to look · WASD move · Space jump · Esc release mouse</p>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
